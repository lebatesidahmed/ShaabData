<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — شعب داتا العظيم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>

<div class="flag-stripe">
  <span class="s-red"></span>
  <span class="s-green"></span>
  <span class="s-red"></span>
</div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="seal">
        <span class="seal-icon">📊</span>
        <span class="seal-year">2022–2025</span>
      </div>
      <span class="auth-brand">شعب داتا العظيم</span>
      <span class="auth-sub">IUP · Data Science · Promo 2025</span>
    </div>

    <div class="auth-title">تسجيل الدخول للشعب</div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="auth-field">
        <label class="auth-label" for="username">اسم المستخدم</label>
        <input class="auth-input" type="text" id="username" name="username" placeholder="username" autocomplete="username" required>
      </div>
      <div class="auth-field">
        <label class="auth-label" for="password">كلمة المرور</label>
        <input class="auth-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="auth-btn">دخول إلى الشعب ←</button>
    </form>

    <div class="auth-switch">
      ليس لديك حساب؟ <a href="/register">سجّل الآن</a>
    </div>
    <div class="auth-switch" style="margin-top:10px;">
      <a href="/">← العودة للرئيسية</a>
    </div>
  </div>
</div>

</body>
</html>
