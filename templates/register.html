<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب — شعب داتا العظيم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>

<div class="flag-stripe">
  <span class="s-red"></span>
  <span class="s-green"></span>
  <span class="s-red"></span>
</div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="seal">
        <span class="seal-icon">📊</span>
        <span class="seal-year">2022–2026</span>
      </div>
      <span class="auth-brand">شعب داتا العظيم</span>
      <span class="auth-sub">IUP · Data Science · Promo 2026</span>
    </div>

    <div class="auth-title">انضم إلى الشعب العظيم</div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">
      <div class="auth-field">
        <label class="auth-label" for="display_name">اسمك الكامل (سيظهر للجميع)</label>
        <input class="auth-input" type="text" id="display_name" name="display_name" placeholder="مثال: لبات محمد" required maxlength="80">
      </div>
      <div class="auth-field">
        <label class="auth-label" for="username">اسم المستخدم (للدخول)</label>
        <input class="auth-input" type="text" id="username" name="username" placeholder="مثال: lbatt2026" autocomplete="username" required maxlength="50" dir="ltr">
      </div>
      <div class="auth-field">
        <label class="auth-label" for="password">كلمة المرور (6 أحرف على الأقل)</label>
        <input class="auth-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password" required minlength="6">
      </div>
      <div class="auth-field">
        <label class="auth-label" for="confirm">تأكيد كلمة المرور</label>
        <input class="auth-input" type="password" id="confirm" name="confirm" placeholder="••••••••" autocomplete="new-password" required>
      </div>
      <button type="submit" class="auth-btn">إنشاء الحساب والانضمام ←</button>
    </form>

    <div class="auth-switch">
      لديك حساب بالفعل؟ <a href="/login">سجّل الدخول</a>
    </div>
    <div class="auth-switch" style="margin-top:10px;">
      <a href="/">← العودة للرئيسية</a>
    </div>
  </div>
</div>

</body>
</html>
